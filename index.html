<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام التايكواندو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
        <div class="p-8 text-center bg-slate-900">
            <h1 class="text-3xl font-bold text-amber-500">Taekwondo Reg</h1>
            <p class="text-slate-400 mt-2 text-sm">نظام إدارة بطولات التايكواندو</p>
        </div>
        
        <form id="loginForm" class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">البريد الإلكتروني للنادي</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute right-3 top-4 text-slate-400"></i>
                    <input type="email" id="email" class="w-full pr-10 p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none transition" placeholder="example@club.com" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">كلمة المرور</label>
                <div class="relative">
                    <i class="fas fa-lock absolute right-3 top-4 text-slate-400"></i>
                    <input type="password" id="password" class="w-full pr-10 p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none transition" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-lg shadow-lg transition duration-300">
                تسجيل الدخول <i class="fas fa-sign-in-alt mr-2"></i>
            </button>
        </form>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // إذا نجح الدخول، نتوجه لصفحة إضافة اللاعبين
                window.location.href = 'add-player.html';
            } catch (error) {
                alert("خطأ في بيانات الدخول: " + error.message);
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'تسجيل الدخول';
            }
        });
    </script>
</body>
</html>
