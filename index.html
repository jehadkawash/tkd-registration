<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام التايكواندو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .hero-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }
        .hero-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(251,191,36,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 20%, rgba(251,191,36,0.05) 0%, transparent 40%);
            animation: pulse-bg 6s ease-in-out infinite alternate;
        }
        @keyframes pulse-bg {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        .form-card {
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.97);
        }
        .input-field:focus {
            border-color: #d97706;
            box-shadow: 0 0 0 3px rgba(217,119,6,0.15);
        }
        .tkd-pattern {
            position: absolute;
            font-size: 8rem;
            opacity: 0.03;
            color: #f59e0b;
            font-weight: 900;
            user-select: none;
        }
    </style>
</head>
<body class="hero-bg min-h-screen flex">

    <!-- خلفية زخرفية -->
    <div class="tkd-pattern" style="top:10%;right:5%;transform:rotate(-15deg)">太</div>
    <div class="tkd-pattern" style="bottom:10%;left:5%;transform:rotate(20deg)">極</div>

    <!-- يسار: معلومات النظام -->
    <div class="hidden lg:flex flex-col justify-center items-start flex-1 p-16 relative z-10">
        <div class="mb-8">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-14 h-14 bg-amber-500 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-fist-raised text-slate-900 text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-white">تسجيل البطولات والاعبين</h1>
                    <p class="text-amber-400 text-sm font-semibold">الاتحاد الأردني للتايكواندو</p>
                </div>
            </div>
            <h2 class="text-5xl font-black text-white leading-tight mb-4">
                نظام إدارة<br>
                <span class="text-amber-400">بطولات التايكواندو</span>
            </h2>
            <p class="text-slate-400 text-lg leading-relaxed max-w-md">
                منصة متكاملة لتسجيل اللاعبين وإدارة البطولات وتتبع الرسوم للأندية الأردنية
            </p>
        </div>

        <div class="grid grid-cols-3 gap-4 mt-8">
            <div class="bg-white/5 border border-white/10 rounded-xl p-4 text-center">
                <i class="fas fa-trophy text-amber-400 text-2xl mb-2"></i>
                <p class="text-white font-bold text-lg">بطولات</p>
                <p class="text-slate-400 text-xs">متعددة</p>
            </div>
            <div class="bg-white/5 border border-white/10 rounded-xl p-4 text-center">
                <i class="fas fa-users text-amber-400 text-2xl mb-2"></i>
                <p class="text-white font-bold text-lg">أندية</p>
                <p class="text-slate-400 text-xs">مشاركة</p>
            </div>
            <div class="bg-white/5 border border-white/10 rounded-xl p-4 text-center">
                <i class="fas fa-shield-alt text-amber-400 text-2xl mb-2"></i>
                <p class="text-white font-bold text-lg">آمن</p>
                <p class="text-slate-400 text-xs">ومحمي</p>
            </div>
        </div>
    </div>

    <!-- يمين: نموذج الدخول -->
    <div class="flex items-center justify-center w-full lg:w-auto lg:min-w-[480px] p-6 relative z-10">
        <div class="form-card w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
            
            <!-- Header -->
            <div class="bg-slate-900 p-8 text-center">
                <div class="w-16 h-16 bg-amber-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-fist-raised text-slate-900 text-2xl"></i>
                </div>
                <h2 class="text-2xl font-black text-white">تسجيل الدخول</h2>
                <p class="text-slate-400 mt-1 text-sm">أدخل بيانات حسابك للمتابعة</p>
            </div>

            <!-- Form -->
            <div class="p-8">
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">البريد الإلكتروني</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="email" id="email"
                                class="input-field w-full pr-10 p-3 border border-slate-200 rounded-lg outline-none transition"
                                placeholder="example@club.com" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">كلمة المرور</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="password"
                                class="input-field w-full pr-10 p-3 border border-slate-200 rounded-lg outline-none transition"
                                placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" id="loginBtn"
                        class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-lg shadow-lg transition duration-200 flex items-center justify-center gap-2">
                        <i class="fas fa-sign-in-alt"></i>
                        تسجيل الدخول
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-sm text-slate-500">
                        ليس لديك حساب؟
                        <a href="register.html" class="text-amber-600 font-bold hover:underline">
                            إنشاء حساب جديد
                        </a>
                    </p>
                </div>

                <!-- رسالة تنبيه -->
                <div id="alertBox" class="hidden mt-4 p-3 rounded-lg text-sm font-bold text-center"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const alertBox = document.getElementById('alertBox');

        function showAlert(msg, type = 'error') {
            alertBox.className = `mt-4 p-3 rounded-lg text-sm font-bold text-center ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}`;
            alertBox.textContent = msg;
            alertBox.classList.remove('hidden');
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
            alertBox.classList.add('hidden');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    await signOut(auth);
                    showAlert("❌ هذا الحساب غير مسجل في النظام");
                    return;
                }

                const userData = userSnap.data();

                if (!userData.approved) {
                    await signOut(auth);
                    showAlert("⏳ حسابك قيد المراجعة من قبل المنظم. سيتم إشعارك عند الموافقة.", 'warning');
                    return;
                }

                if (userData.role === "super_admin") {
                    window.location.href = "admin-dashboard.html";
                } else {
                    window.location.href = "dashboard.html";
                }

            } catch (error) {
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    showAlert("❌ البريد الإلكتروني أو كلمة المرور غير صحيحة");
                } else if (error.code === 'auth/too-many-requests') {
                    showAlert("⚠️ تم تجاوز عدد المحاولات. حاول لاحقاً");
                } else {
                    showAlert("❌ " + error.message);
                }
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
            }
        });
    </script>
</body>
</html>
