<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | نظام التايكواندو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .input-field:focus {
            border-color: #d97706;
            box-shadow: 0 0 0 3px rgba(217,119,6,0.15);
            outline: none;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
        
        <div class="bg-slate-900 p-8 text-center">
            <div class="w-16 h-16 bg-amber-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-fist-raised text-slate-900 text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black text-white">إنشاء حساب كابتن</h1>
            <p class="text-slate-400 mt-1 text-sm">سيتم مراجعة حسابك من قبل المنظم</p>
        </div>

        <form id="registerForm" class="p-8 space-y-5">

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">اسم النادي</label>
                <div class="relative">
                    <i class="fas fa-dumbbell absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="clubName"
                        class="input-field w-full pr-10 p-3 border border-slate-200 rounded-lg transition"
                        placeholder="مثال: نادي أبطال الأردن" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">الاسم الكامل للكابتن</label>
                <div class="relative">
                    <i class="fas fa-user absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="captainName"
                        class="input-field w-full pr-10 p-3 border border-slate-200 rounded-lg transition"
                        placeholder="مثال: محمد أحمد" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">رقم الهاتف</label>
                <div class="relative">
                    <i class="fas fa-phone absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="tel" id="phone"
                        class="input-field w-full pr-10 p-3 border border-slate-200 rounded-lg transition"
                        placeholder="07XXXXXXXX" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">البريد الإلكتروني</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="email" id="email"
                        class="input-field w-full pr-10 p-3 border border-slate-200 rounded-lg transition"
                        placeholder="example@club.com" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">كلمة المرور</label>
                <div class="relative">
                    <i class="fas fa-lock absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" id="password"
                        class="input-field w-full pr-10 p-3 border border-slate-200 rounded-lg transition"
                        placeholder="6 أحرف على الأقل" required minlength="6">
                </div>
            </div>

            <button type="submit" id="registerBtn"
                class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-lg shadow-lg transition flex items-center justify-center gap-2">
                <i class="fas fa-user-plus"></i>
                إنشاء الحساب
            </button>

            <div id="alertBox" class="hidden p-3 rounded-lg text-sm font-bold text-center"></div>
        </form>

        <p class="text-center text-sm text-slate-500 mb-6">
            لديك حساب؟
            <a href="index.html" class="text-amber-600 font-bold hover:underline">تسجيل الدخول</a>
        </p>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
        import { setDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

        const form = document.getElementById('registerForm');
        const btn = document.getElementById('registerBtn');
        const alertBox = document.getElementById('alertBox');

        function showAlert(msg, type = 'error') {
            alertBox.className = `p-3 rounded-lg text-sm font-bold text-center ${type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            alertBox.textContent = msg;
            alertBox.classList.remove('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const clubName = document.getElementById('clubName').value.trim();
            const captainName = document.getElementById('captainName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإنشاء...';
            alertBox.classList.add('hidden');

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    email: email,
                    clubName: clubName,
                    captainName: captainName,
                    phone: phone,
                    role: "captain",
                    approved: false,
                    createdAt: serverTimestamp()
                });

                await signOut(auth);

                showAlert("✅ تم إنشاء الحساب بنجاح! بانتظار موافقة المنظم.", 'success');
                form.reset();

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 3000);

            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    showAlert("❌ هذا البريد الإلكتروني مستخدم مسبقاً");
                } else {
                    showAlert("❌ " + error.message);
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء الحساب';
            }
        });
    </script>
</body>
</html>
