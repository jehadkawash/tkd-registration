<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات | Taekwondo Reg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        :root{--bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;--border:#e2e8f0;--text:#0f172a;--text2:#64748b;--sidebar:#0f172a;--sidebar-text:#cbd5e1;--accent:#d97706;}
        .dark{--bg:#0a0f1e;--surface:#111827;--surface2:#1f2937;--border:#374151;--text:#f1f5f9;--text2:#94a3b8;--sidebar:#060c18;--sidebar-text:#94a3b8;}
        *{transition:background-color .2s,border-color .2s,color .2s;}
        body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);}
        .surface{background:var(--surface);border-color:var(--border);}
        .surface2{background:var(--surface2);border-color:var(--border);}
        .t-main{color:var(--text);} .t-sub{color:var(--text2);}
        #mobileSidebar{transform:translateX(100%);transition:transform .3s ease;background:var(--sidebar);}
        #mobileSidebar.open{transform:translateX(0);}
        #sidebarOverlay{display:none;} #sidebarOverlay.open{display:block;}
        textarea{background:var(--surface2);border-color:var(--border);color:var(--text);}
        textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(217,119,6,.15);outline:none;}
        select,input{background:var(--surface2);border-color:var(--border);color:var(--text);}
        select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(217,119,6,.15);outline:none;}
        /* notification card */
        .notif-card{border-right:4px solid transparent;transition:all .2s;}
        .notif-card.unread{border-right-color:var(--accent);}
        .notif-card.unread .surface{background:rgba(217,119,6,.05);}
        @keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        .slide-in{animation:slideIn .3s ease;}
        /* reply thread */
        .reply-item{border-right:3px solid var(--border);padding-right:12px;margin-top:8px;}
        .reply-item.admin{border-right-color:var(--accent);}
    </style>
</head>
<body class="flex min-h-screen">

<!-- ── SIDEBAR DESKTOP ── -->
<aside style="background:var(--sidebar)" class="w-64 min-h-screen flex-col hidden md:flex shadow-xl flex-shrink-0 border-l border-white/5">
    <div class="p-6 border-b border-white/10 text-center">
        <div class="w-12 h-12 bg-amber-500 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-lg">
            <i class="fas fa-fist-raised text-slate-900 text-lg"></i>
        </div>
        <h1 class="text-lg font-black text-amber-400">Taekwondo Reg</h1>
        <p id="displayClubName" class="text-xs mt-1" style="color:var(--sidebar-text)">جاري التحميل...</p>
    </div>
    <nav class="flex-1 p-4 space-y-1" id="sidebarNav">
        <!-- تُعبأ ديناميكياً حسب الدور -->
    </nav>
    <div class="p-4 border-t border-white/10 space-y-2">
        <button onclick="toggleDark()" class="w-full flex items-center gap-2 p-2 rounded-lg hover:bg-white/10 transition text-sm" style="color:var(--sidebar-text)">
            <i id="darkIcon" class="fas fa-moon w-4"></i><span id="darkLabel">الوضع الداكن</span>
        </button>
        <button id="logoutBtn" class="w-full flex items-center gap-2 p-2 text-red-400 hover:bg-white/10 rounded-lg transition font-bold text-sm">
            <i class="fas fa-sign-out-alt w-4"></i> تسجيل الخروج
        </button>
    </div>
</aside>

<!-- MOBILE -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-40 md:hidden" onclick="closeSidebar()"></div>
<div id="mobileSidebar" class="fixed top-0 right-0 h-full w-72 z-50 flex flex-col shadow-2xl md:hidden border-l border-white/10">
    <div class="p-5 border-b border-white/10 flex justify-between items-center">
        <div>
            <h1 class="text-lg font-black text-amber-400">Taekwondo Reg</h1>
            <p id="mobileClubName" class="text-xs mt-0.5" style="color:var(--sidebar-text)"></p>
        </div>
        <button onclick="closeSidebar()" class="text-slate-400 hover:text-white p-2"><i class="fas fa-times text-xl"></i></button>
    </div>
    <nav class="flex-1 p-4 space-y-1" id="mobileSidebarNav"></nav>
    <div class="p-4 border-t border-white/10 space-y-2">
        <button onclick="toggleDark()" class="w-full flex items-center gap-2 p-2 rounded-lg hover:bg-white/10 transition text-sm" style="color:var(--sidebar-text)">
            <i class="fas fa-moon w-4"></i> الوضع الداكن
        </button>
        <button id="mobileLogoutBtn" class="w-full flex items-center gap-2 p-2 text-red-400 hover:bg-white/10 rounded-lg transition font-bold text-sm">
            <i class="fas fa-sign-out-alt w-4"></i> تسجيل الخروج
        </button>
    </div>
</div>

<!-- ── MAIN ── -->
<main class="flex-1 flex flex-col min-h-screen overflow-y-auto">
    <header class="surface border-b sticky top-0 z-30 px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="openSidebar()" class="md:hidden p-2 rounded-lg text-amber-500"><i class="fas fa-bars text-lg"></i></button>
            <div>
                <h2 class="font-black t-main text-sm md:text-base">
                    <i class="fas fa-bell text-amber-500 ml-2"></i>الإشعارات
                </h2>
                <p id="userEmailDisplay" class="text-xs t-sub hidden md:block"></p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span id="unreadBadge" class="hidden bg-red-500 text-white text-xs font-black px-2.5 py-1 rounded-full"></span>
            <button onclick="markAllRead()" class="text-xs t-sub hover:text-amber-500 font-bold transition border border-current px-3 py-1.5 rounded-lg">
                <i class="fas fa-check-double ml-1"></i>قراءة الكل
            </button>
        </div>
    </header>

    <div class="p-3 md:p-6 max-w-3xl mx-auto w-full space-y-5">

        <!-- إرسال إشعار (للأدمن فقط) -->
        <div id="sendSection" class="hidden surface border rounded-2xl shadow-sm overflow-hidden">
            <div class="surface2 border-b p-4">
                <h4 class="font-black t-main text-sm"><i class="fas fa-paper-plane text-amber-500 ml-2"></i>إرسال إشعار</h4>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-xs font-black t-sub mb-1.5">المستلم</label>
                    <select id="notifTarget" class="w-full p-3 border rounded-xl text-sm">
                        <option value="all">📢 جميع الكباتن</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black t-sub mb-1.5">عنوان الإشعار</label>
                    <input type="text" id="notifTitle" class="w-full p-3 border rounded-xl text-sm" placeholder="مثال: تنبيه مهم بخصوص البطولة">
                </div>
                <div>
                    <label class="block text-xs font-black t-sub mb-1.5">نص الرسالة</label>
                    <textarea id="notifBody" rows="3" class="w-full p-3 border rounded-xl text-sm resize-none" placeholder="اكتب رسالتك هنا..."></textarea>
                </div>
                <div>
                    <label class="block text-xs font-black t-sub mb-1.5">أيقونة / نوع</label>
                    <div class="flex gap-2 flex-wrap">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="notifType" value="info" checked class="accent-amber-600">
                            <span class="text-xs t-main">📢 معلومة</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="notifType" value="warning" class="accent-amber-600">
                            <span class="text-xs t-main">⚠️ تحذير</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="notifType" value="success" class="accent-amber-600">
                            <span class="text-xs t-main">✅ إعلان</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="notifType" value="urgent" class="accent-amber-600">
                            <span class="text-xs t-main">🚨 عاجل</span>
                        </label>
                    </div>
                </div>
                <div id="sendAlert" class="hidden p-3 rounded-xl text-xs font-bold text-center"></div>
                <button onclick="sendNotification()" id="sendBtn"
                    class="w-full text-white font-black py-3 rounded-xl shadow transition text-sm flex items-center justify-center gap-2"
                    style="background:var(--sidebar)">
                    <i class="fas fa-paper-plane"></i> إرسال الإشعار
                </button>
            </div>
        </div>

        <!-- قائمة الإشعارات -->
        <div>
            <div class="flex justify-between items-center mb-3">
                <h4 class="font-black t-main text-sm">الإشعارات الواردة</h4>
                <select id="notifFilter" onchange="renderNotifications()" class="text-xs border rounded-lg p-1.5 surface">
                    <option value="all">الكل</option>
                    <option value="unread">غير مقروءة</option>
                    <option value="read">مقروءة</option>
                </select>
            </div>
            <div id="notifList" class="space-y-3">
                <div class="surface border rounded-xl p-8 text-center">
                    <i class="fas fa-spinner fa-spin text-amber-500 text-2xl mb-2 block"></i>
                    <p class="t-sub text-sm">جاري تحميل الإشعارات...</p>
                </div>
            </div>
        </div>

    </div>
</main>

<script type="module">
import { db, auth } from './firebase-config.js';
import {
    collection, addDoc, getDocs, getDoc, doc, updateDoc,
    query, where, orderBy, serverTimestamp, onSnapshot, writeBatch
} from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

/* Dark Mode */
window.toggleDark = ()=>{ const d=document.documentElement.classList.toggle('dark'); localStorage.setItem('darkMode',d); updateDarkUI(); };
function updateDarkUI(){ const d=document.documentElement.classList.contains('dark'); const i=document.getElementById('darkIcon'),l=document.getElementById('darkLabel'); if(i) i.className=d?'fas fa-sun w-4':'fas fa-moon w-4'; if(l) l.textContent=d?'الوضع الفاتح':'الوضع الداكن'; }
if(localStorage.getItem('darkMode')==='true') document.documentElement.classList.add('dark');
updateDarkUI();

/* Sidebar */
window.openSidebar  = ()=>{ document.getElementById('mobileSidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('open'); document.body.style.overflow='hidden'; };
window.closeSidebar = ()=>{ document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); document.body.style.overflow=''; };

/* State */
let currentUser=null, userRole=null, allNotifs=[];

const TYPE_META = {
    info:    { icon:'📢', color:'bg-blue-100 text-blue-700',   border:'#3b82f6' },
    warning: { icon:'⚠️', color:'bg-amber-100 text-amber-700', border:'#d97706' },
    success: { icon:'✅', color:'bg-green-100 text-green-700',  border:'#10b981' },
    urgent:  { icon:'🚨', color:'bg-red-100 text-red-700',      border:'#ef4444' }
};

/* Auth */
onAuthStateChanged(auth, async(user)=>{
    if(!user){ window.location.href="index.html"; return; }
    const snap=await getDoc(doc(db,"users",user.uid));
    if(!snap.exists()||!snap.data().approved){ await signOut(auth); window.location.href="index.html"; return; }
    currentUser=user;
    const ud=snap.data();
    userRole=ud.role;
    const club=ud.clubName||ud.adminName||user.email;

    document.getElementById('displayClubName').textContent=club;
    document.getElementById('mobileClubName').textContent=club;
    document.getElementById('userEmailDisplay').textContent=user.email;

    buildSidebar(userRole);

    if(userRole==='super_admin'){
        document.getElementById('sendSection').classList.remove('hidden');
        await loadCaptainsForSelect();
    }

    // Real-time listener
    listenNotifications(user.uid, userRole);
});

function buildSidebar(role){
    const isAdmin = role==='super_admin';
    const links = isAdmin
        ? [
            {href:'admin-dashboard.html',icon:'fas fa-chart-line',label:'لوحة القيادة'},
            {href:'notifications.html',icon:'fas fa-bell',label:'الإشعارات',active:true},
          ]
        : [
            {href:'dashboard.html',icon:'fas fa-home',label:'الرئيسية'},
            {href:'add-player.html',icon:'fas fa-user-plus',label:'تسجيل اللاعبين'},
            {href:'club-roster.html',icon:'fas fa-list',label:'كشف النادي'},
            {href:'club-profile.html',icon:'fas fa-id-badge',label:'ملف النادي'},
            {href:'notifications.html',icon:'fas fa-bell',label:'الإشعارات',active:true},
          ];
    const html=links.map(l=>`
        <a href="${l.href}" class="flex items-center gap-3 p-3 rounded-lg transition text-sm ${l.active?'font-black':'hover:bg-white/10'}"
           style="${l.active?'background:var(--accent);color:#fff':'color:var(--sidebar-text)'}">
           <i class="${l.icon} w-4"></i>${l.label}
        </a>`).join('');
    document.getElementById('sidebarNav').innerHTML=html;
    document.getElementById('mobileSidebarNav').innerHTML=html;
}

async function loadCaptainsForSelect(){
    const snap=await getDocs(query(collection(db,"users"),where("role","==","captain"),where("approved","==",true)));
    const sel=document.getElementById('notifTarget');
    snap.forEach(d=>{ const u=d.data(); const o=document.createElement('option'); o.value=d.id; o.textContent=`🏟️ ${u.clubName} — ${u.captainName||''}`; sel.appendChild(o); });
}

/* ── Real-time Notifications ── */
function listenNotifications(uid, role){
    let q2;
    if(role==='super_admin'){
        // الأدمن يرى كل الإشعارات التي أرسلها أو التي استلمها
        q2 = query(collection(db,"notifications"), orderBy("createdAt","desc"));
    } else {
        // الكابتن يرى الإشعارات المرسلة له أو لـ all
        q2 = query(collection(db,"notifications"), where("targetId","in",[uid,"all"]), orderBy("createdAt","desc"));
    }
    onSnapshot(q2,(snap)=>{
        allNotifs=[];
        snap.forEach(d=>allNotifs.push({id:d.id,...d.data()}));
        renderNotifications();
        updateUnreadBadge(uid);
    });
}

function updateUnreadBadge(uid){
    const count=allNotifs.filter(n=> !n.readBy?.includes(uid)).length;
    const badge=document.getElementById('unreadBadge');
    if(count>0){ badge.textContent=count+' غير مقروء'; badge.classList.remove('hidden'); }
    else badge.classList.add('hidden');
}

window.renderNotifications = function(){
    const filter=document.getElementById('notifFilter').value;
    const uid=currentUser?.uid||'';
    let list=[...allNotifs];
    if(filter==='unread') list=list.filter(n=>!n.readBy?.includes(uid));
    if(filter==='read')   list=list.filter(n=>n.readBy?.includes(uid));

    const container=document.getElementById('notifList');
    if(!list.length){
        container.innerHTML=`<div class="surface border rounded-2xl p-10 text-center">
            <i class="fas fa-bell-slash text-4xl mb-3 block opacity-20 t-main"></i>
            <p class="t-sub font-bold">لا توجد إشعارات</p>
        </div>`;
        return;
    }

    container.innerHTML=list.map(n=>{
        const meta=TYPE_META[n.type]||TYPE_META.info;
        const isUnread=!n.readBy?.includes(uid);
        const timeAgo=getTimeAgo(n.createdAt?.seconds);
        const repliesHtml=(n.replies||[]).map(r=>`
            <div class="reply-item ${r.role==='super_admin'?'admin':''} text-xs">
                <div class="flex items-center gap-2 mb-1">
                    <span class="font-black ${r.role==='super_admin'?'text-amber-500':'t-main'}">${r.senderName}</span>
                    <span class="t-sub">${getTimeAgo(r.createdAt?.seconds)}</span>
                </div>
                <p class="t-sub">${r.text}</p>
            </div>`).join('');

        return `
        <div class="notif-card surface border rounded-2xl shadow-sm overflow-hidden slide-in ${isUnread?'unread':''}" id="notif-${n.id}"
             style="${isUnread?`border-right-color:${meta.border}`:''}">
            <div class="p-4" onclick="markRead('${n.id}')">
                <div class="flex justify-between items-start gap-3">
                    <div class="flex items-start gap-3 flex-1 min-w-0">
                        <span class="text-xl flex-shrink-0 mt-0.5">${meta.icon}</span>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 flex-wrap mb-1">
                                <p class="font-black t-main text-sm">${n.title}</p>
                                ${isUnread?'<span class="bg-amber-100 text-amber-700 text-[10px] font-black px-1.5 py-0.5 rounded-full">جديد</span>':''}
                            </div>
                            <p class="t-sub text-xs leading-relaxed">${n.body}</p>
                            <div class="flex items-center gap-3 mt-2">
                                <span class="text-[10px] t-sub"><i class="fas fa-clock ml-1"></i>${timeAgo}</span>
                                <span class="text-[10px] t-sub">من: ${n.senderName||'المنظم'}</span>
                            </div>
                        </div>
                    </div>
                    ${isUnread?`<button onclick="markRead('${n.id}');event.stopPropagation()" class="text-[10px] t-sub hover:text-amber-500 transition font-bold flex-shrink-0 border border-current px-2 py-1 rounded-lg">قراءة</button>`:''}
                </div>
                ${repliesHtml?`<div class="mt-3 space-y-2 border-t pt-3" style="border-color:var(--border)">${repliesHtml}</div>`:''}
            </div>
            <!-- حقل الرد -->
            <div class="px-4 pb-4 border-t pt-3" style="border-color:var(--border)">
                <div class="flex gap-2">
                    <input type="text" id="reply-${n.id}" placeholder="اكتب رداً..." class="flex-1 p-2 border rounded-lg text-xs">
                    <button onclick="sendReply('${n.id}')"
                        class="bg-amber-600 hover:bg-amber-700 text-white font-black px-3 py-2 rounded-lg transition text-xs flex-shrink-0">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
};

/* ── Mark Read ── */
window.markRead = async function(nid){
    const uid=currentUser.uid;
    const notif=allNotifs.find(n=>n.id===nid);
    if(!notif||notif.readBy?.includes(uid)) return;
    try{
        const readBy=[...(notif.readBy||[]),uid];
        await updateDoc(doc(db,"notifications",nid),{readBy});
    }catch(e){console.error(e);}
};

/* ── Mark All Read ── */
window.markAllRead = async function(){
    const uid=currentUser.uid;
    const unread=allNotifs.filter(n=>!n.readBy?.includes(uid));
    if(!unread.length) return;
    const batch=writeBatch(db);
    unread.forEach(n=>{
        const readBy=[...(n.readBy||[]),uid];
        batch.update(doc(db,"notifications",n.id),{readBy});
    });
    await batch.commit();
};

/* ── Send Notification ── */
window.sendNotification = async function(){
    const target=document.getElementById('notifTarget').value;
    const title=document.getElementById('notifTitle').value.trim();
    const body=document.getElementById('notifBody').value.trim();
    const type=document.querySelector('input[name="notifType"]:checked').value;
    const alertDiv=document.getElementById('sendAlert');

    function showSendAlert(msg,ok=false){
        alertDiv.className=`p-3 rounded-xl text-xs font-bold text-center ${ok?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`;
        alertDiv.textContent=msg; alertDiv.classList.remove('hidden');
    }

    if(!title||!body){ showSendAlert('الرجاء تعبئة العنوان والرسالة!'); return; }

    const btn=document.getElementById('sendBtn');
    btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
    try{
        const snap=await getDoc(doc(db,"users",currentUser.uid));
        const senderName=snap.data()?.adminName||snap.data()?.captainName||'المنظم';

        if(target==='all'){
            // إرسال لجميع الكباتن
            const captains=await getDocs(query(collection(db,"users"),where("role","==","captain"),where("approved","==",true)));
            const promises=captains.docs.map(d=>addDoc(collection(db,"notifications"),{
                title,body,type,targetId:d.id,targetAll:false,
                senderId:currentUser.uid,senderName,readBy:[],replies:[],createdAt:serverTimestamp()
            }));
            // وإرسال واحد لـ "all" للعرض
            promises.push(addDoc(collection(db,"notifications"),{
                title,body,type,targetId:'all',
                senderId:currentUser.uid,senderName,readBy:[],replies:[],createdAt:serverTimestamp()
            }));
            await Promise.all(promises);
        } else {
            await addDoc(collection(db,"notifications"),{
                title,body,type,targetId:target,
                senderId:currentUser.uid,senderName,readBy:[],replies:[],createdAt:serverTimestamp()
            });
        }
        showSendAlert('✅ تم إرسال الإشعار بنجاح!',true);
        document.getElementById('notifTitle').value='';
        document.getElementById('notifBody').value='';
        setTimeout(()=>alertDiv.classList.add('hidden'),3000);
    }catch(e){ showSendAlert('❌ '+e.message); }
    finally{ btn.disabled=false; btn.innerHTML='<i class="fas fa-paper-plane"></i> إرسال الإشعار'; }
};

/* ── Send Reply ── */
window.sendReply = async function(nid){
    const input=document.getElementById('reply-'+nid);
    const text=input?.value?.trim();
    if(!text) return;
    try{
        const snap=await getDoc(doc(db,"users",currentUser.uid));
        const ud=snap.data();
        const senderName=ud.adminName||ud.captainName||ud.clubName||currentUser.email;
        const notif=allNotifs.find(n=>n.id===nid);
        const replies=[...(notif?.replies||[]),{
            text, senderName, senderId:currentUser.uid,
            role:userRole, createdAt:{seconds:Math.floor(Date.now()/1000)}
        }];
        await updateDoc(doc(db,"notifications",nid),{replies});
        await markRead(nid);
        input.value='';
    }catch(e){ alert("❌ "+e.message); }
};

/* ── Helpers ── */
function getTimeAgo(seconds){
    if(!seconds) return '';
    const diff=Math.floor(Date.now()/1000)-seconds;
    if(diff<60)   return 'الآن';
    if(diff<3600) return Math.floor(diff/60)+' دقيقة';
    if(diff<86400)return Math.floor(diff/3600)+' ساعة';
    return Math.floor(diff/86400)+' يوم';
}

/* Logout */
async function doLogout(){ if(confirm("تسجيل الخروج؟")){ await signOut(auth); window.location.href='index.html'; } }
document.getElementById('logoutBtn').addEventListener('click',doLogout);
document.getElementById('mobileLogoutBtn').addEventListener('click',doLogout);
</script>
